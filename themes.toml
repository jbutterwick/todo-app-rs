# Themes for todo-app-rs. Each [[theme]] defines the colours used across the UI.
# Colours are hex ("#rrggbb") or ratatui names ("blue", "dark-gray", ...).
#
# Roles:
#   bg/fg     base background / default text
#   open ongoing checked obsolete question   the five item statuses
#   accent    selection + cursor highlight
#   error     error messages
#   muted     dim text (borders, weekday header, status line)
#   marker    calendar days that have due items

[[theme]]
name = "Catppuccin Mocha"
bg = "#1e1e2e"
fg = "#cdd6f4"
open = "#89b4fa"
ongoing = "#cba6f7"
checked = "#a6e3a1"
obsolete = "#6c7086"
question = "#f9e2af"
accent = "#f5c2e7"
error = "#f38ba8"
muted = "#a6adc8"
marker = "#fab387"

